services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - CHAT_MODEL=${CHAT_MODEL:-nefke-q4_k_m}
      - FALLBACK_MODEL=${FALLBACK_MODEL:-nefke-q4_k_m}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - INTERNAL_CHAT_KEY=${INTERNAL_CHAT_KEY:-secret-key}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - ollama
    volumes:
      - ./build_kb.py:/app/build_kb.py

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/var/lib/ollama
      - ../training:/models:ro
    environment:
      - OLLAMA_MODELS=/var/lib/ollama/models

  build-kb:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: python /app/build_kb.py
    depends_on:
      - ollama
      - api
    environment:
      - OLLAMA_URL=http://ollama:11434
      - EMBEDDING_MODEL=nomic-embed-text
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}

volumes:
  ollama-data: