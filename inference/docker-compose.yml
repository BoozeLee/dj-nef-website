services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
      - ../training:/models:ro
    environment:
      - OLLAMA_KEEP_ALIVE=15m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  model-init:
    image: ollama/ollama:latest
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "until ollama list 2>/dev/null; do sleep 2; done &&
       if ! ollama list | grep -q nefke-q4_k_m; then
         ollama create nefke-q4_k_m -f /models/Modelfile &&
         ollama pull nomic-embed-text;
       else
         echo 'model already registered';
       fi"
    volumes:
      - ollama-data:/root/.ollama
      - ../training:/models:ro
      - ./Modelfile:/models/Modelfile:ro
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - CHAT_MODEL=${CHAT_MODEL:-nefke-q4_k_m}
      - FALLBACK_MODEL=${FALLBACK_MODEL:-nefke-q4_k_m}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - INTERNAL_CHAT_KEY=${INTERNAL_CHAT_KEY:-secret-key}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - ollama
    volumes:
      - ./build_kb.py:/app/build_kb.py

  # Exposes the FastAPI gateway via Cloudflare Tunnel.
  # Quick-tunnel (no token): random URL per restart, good for testing.
  # Named tunnel (production): set CLOUDFLARE_TUNNEL_TOKEN and use:
  #   command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --url http://api:8000
    depends_on:
      - api
    profiles:
      - tunnel

  build-kb:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: python /app/build_kb.py
    depends_on:
      - ollama
      - api
    environment:
      - OLLAMA_URL=http://ollama:11434
      - EMBEDDING_MODEL=nomic-embed-text
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    profiles:
      - kb

volumes:
  ollama-data:
